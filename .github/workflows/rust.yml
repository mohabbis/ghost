name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    # Ghost is macOS-only: it links against core-graphics / accessibility-sys
    # and Tauri's macOS webview, so it must build on a mac runner.
    runs-on: macos-latest

    defaults:
      run:
        # The Cargo crate lives in src-tauri/, not the repo root.
        working-directory: src-tauri

    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: src-tauri
    - name: Check
      run: cargo check --verbose
    - name: Clippy
      run: cargo clippy --verbose
    - name: Run tests
      run: cargo test --verbose
