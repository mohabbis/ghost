name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-mac:
    name: Build macOS DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Configure macOS signing
        run: |
          if [ -n "${{ secrets.BUILD_CERTIFICATE_BASE64 }}" ]; then
            echo "SIGNING_MODE=full" >> "$GITHUB_ENV"
            echo "APPLE_CERTIFICATE=${{ secrets.BUILD_CERTIFICATE_BASE64 }}" >> "$GITHUB_ENV"
            echo "APPLE_CERTIFICATE_PASSWORD=${{ secrets.P12_PASSWORD }}" >> "$GITHUB_ENV"
            echo "APPLE_SIGNING_IDENTITY=${{ secrets.APPLE_SIGNING_IDENTITY }}" >> "$GITHUB_ENV"
            echo "APPLE_ID=${{ secrets.APPLE_ID }}" >> "$GITHUB_ENV"
            echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}" >> "$GITHUB_ENV"
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}" >> "$GITHUB_ENV"
          else
            echo "SIGNING_MODE=adhoc" >> "$GITHUB_ENV"
            echo "APPLE_SIGNING_IDENTITY=-" >> "$GITHUB_ENV"
          fi

      - name: Build universal macOS DMG
        run: cargo tauri build --target universal-apple-darwin --bundles dmg

      - name: Stage macOS asset
        run: |
          DMG=$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -name "*.dmg" -print -quit)
          if [ -z "$DMG" ]; then
            echo "No DMG found in Tauri bundle output" >&2
            exit 1
          fi
          cp "$DMG" Ghost.dmg
          mkdir -p public/downloads
          cp Ghost.dmg public/downloads/Ghost.dmg
          echo "Built $DMG -> Ghost.dmg"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: Ghost.dmg
          fail_on_unmatched_files: true

      - name: Upload website artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-website-binary
          path: public/downloads/Ghost.dmg
          retention-days: 7

  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Build Windows NSIS installer
        run: cargo tauri build --bundles nsis

      - name: Stage Windows asset
        shell: pwsh
        run: |
          $installer = Get-ChildItem src-tauri\target\release\bundle\nsis\*-setup.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $installer) {
            Write-Error "No NSIS installer found in src-tauri\target\release\bundle\nsis"
            exit 1
          }
          Copy-Item $installer.FullName Ghost_Setup.exe
          New-Item -ItemType Directory -Force -Path public\downloads | Out-Null
          Copy-Item Ghost_Setup.exe public\downloads\Ghost_Setup.exe
          Write-Host "Built: $($installer.FullName) -> Ghost_Setup.exe"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: Ghost_Setup.exe
          fail_on_unmatched_files: true

      - name: Upload website artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-website-binary
          path: public/downloads/Ghost_Setup.exe
          retention-days: 7
