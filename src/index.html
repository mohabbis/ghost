<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ghost</title>
    <script type="module" src="/src/main.ts"></script>
    <style>
      body { font-family: system-ui; background: #0f0f11; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
      button { background: #3b82f6; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; margin: 8px; cursor: pointer; }
      button:disabled { background: #4b5563; cursor: not-allowed; }
      #status { margin-top: 20px; color: #a1a1aa; }
    </style>
  </head>
  <body>
    <h1>Ghost 🦜</h1>
    <button id="recordBtn">Record</button>
    <button id="stopBtn">Stop</button>
    <button id="replayBtn" disabled>Replay</button>
    <p id="status">Idle</p>
  </body>
</html>
