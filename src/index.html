<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ghost</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <main class="app">
      <header class="app__header">
        <h1 class="brand"><span class="brand__glyph">👻</span> Ghost</h1>
        <p class="tagline">Watches what you do. Replays it for you.</p>
      </header>

      <!-- Accessibility permission gate -->
      <section id="perm-banner" class="banner banner--warn" hidden>
        <span id="perm-text">Ghost needs Accessibility permission to watch and replay clicks.</span>
        <button id="perm-grant" class="btn btn--small">Grant Access</button>
      </section>

      <section class="controls">
        <button id="record-btn" class="btn btn--record" disabled>
          <span class="dot"></span> Record
        </button>
        <button id="replay-btn" class="btn" disabled>Replay</button>
        <button id="clear-btn" class="btn btn--ghost" disabled>Clear</button>
      </section>

      <section class="status">
        <span id="status-label" class="status__label">Idle</span>
        <span id="step-count" class="status__count">0 steps</span>
      </section>

      <ol id="steps" class="steps" aria-live="polite"></ol>
    </main>
  </body>
</html>
